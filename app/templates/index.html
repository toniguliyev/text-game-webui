{% extends "base.html" %}
{% block content %}
<section class="layout" x-data="textGameApp()" x-init="init()">
  <template x-if="dtmLink.enabled && !dtmLink.linked">
    <div class="panel main-column stack">
      <h2>Link Discord Account</h2>
      <p>This DTM web UI only unlocks after you link your Discord account. Use this command in Discord from the account you play with:</p>
      <pre><code x-text="dtmLink.command || ('+zork link-account ' + (dtmLink.link_code || '...'))"></code></pre>
      <p x-show="dtmLink.link_code">
        Waiting for confirmation of code:
        <strong x-text="dtmLink.link_code"></strong>
      </p>
      <p x-show="dtmLink.error" class="error" x-text="dtmLink.error"></p>
      <p>After Discord confirms the link, this page will unlock automatically.</p>
    </div>
  </template>
  <template x-if="!dtmLink.enabled || dtmLink.linked">
  <div class="dtm-linked-shell">

  <!-- ====== SIDEBAR ====== -->
  <aside class="panel sidebar" :class="{ 'sidebar-open': $store.app.sidebarOpen }">
    <!-- Campaign Selector -->
    <div class="campaign-selector-row">
      <select :value="selectedCampaignId || ''" @change="$event.target.value && selectCampaign($event.target.value)">
        <option value="" disabled>Select campaign...</option>
        <template x-for="campaign in campaigns" :key="campaign.id">
          <option :value="campaign.id" x-text="campaign.name" :selected="selectedCampaignId === campaign.id"></option>
        </template>
      </select>
      <button type="button" class="icon-btn" @click="$store.app.openModal('manageCampaigns')" title="Manage campaigns">&#x270E;</button>
      <button type="button" class="icon-btn" @click="$store.app.openModal('newCampaign')" title="New campaign">+</button>
    </div>

    <!-- Quick Info -->
    <template x-if="selectedCampaignId && playerData">
      <div class="quick-info">
        <div class="quick-info-top">
          <template x-if="playerData?.state?.avatar_url">
            <img :src="playerData?.state?.avatar_url" class="quick-info-avatar" alt="avatar" />
          </template>
          <div class="quick-info-details">
            <span class="quick-info-name" x-text="resolveCharacterName()"></span>
            <div class="quick-info-xp">
              <span class="xp-level">Lv <span x-text="playerData?.level || 1"></span></span>
              <div class="xp-bar-track"><div class="xp-bar-fill" :style="'width:' + Math.min(100, ((playerData?.xp || 0) % 100)) + '%'"></div></div>
              <span class="xp-value" x-text="(playerData?.xp || 0) + ' XP'"></span>
            </div>
          </div>
        </div>
        <template x-if="playerData?.state?.room_title">
          <span class="quick-info-room" x-text="playerData?.state?.room_title"></span>
        </template>
        <div class="quick-info-buttons">
          <button type="button" @click="$store.app.openModal('playerSheet')">Character</button>
          <button type="button" @click="$store.app.openModal('mapView')">Map</button>
          <button type="button" @click="$store.app.openModal('campaignConfig')">Config</button>
        </div>
      </div>
    </template>

    <!-- Game Time Widget -->
    <div class="game-time-widget" x-show="gameTime && gameTime.day">
      <span class="game-time-label" x-text="gameTime.date_label || ('Day ' + (gameTime.day||1) + ', ' + (gameTime.period||''))"></span>
      <small class="game-time-clock" x-text="String(gameTime.hour||0).padStart(2,'0') + ':' + String(gameTime.minute||0).padStart(2,'0')"></small>
    </div>

    <!-- Chapters Panel -->
    <template x-if="chapterList && chapterList.chapters && chapterList.chapters.length > 0">
      <div class="chapters-panel">
        <button
          type="button"
          class="chapters-heading"
          @click="chaptersPanelOpen = !chaptersPanelOpen"
          :aria-expanded="chaptersPanelOpen"
          aria-controls="chapters-list"
        >
          Chapters <small x-text="chaptersPanelOpen ? '\u25B4' : '\u25BE'"></small>
        </button>
        <div x-show="chaptersPanelOpen" class="chapters-list" id="chapters-list">
          <template x-for="(ch, idx) in chapterList.chapters" :key="idx">
            <div class="chapter-entry" :class="{ 'chapter-current': ch.is_current, 'chapter-completed': ch.status === 'completed', 'chapter-resolved': ch.status === 'resolved' }">
              <div class="chapter-header">
                <span class="chapter-status-icon"
                  x-text="ch.status === 'completed' || ch.status === 'resolved' ? '\u2713' : (ch.is_current ? '\u25B6' : '\u25CB')"></span>
                <span class="chapter-title" x-text="ch.title"></span>
              </div>
              <template x-if="ch.is_current && ch.summary">
                <p class="chapter-summary" x-text="ch.summary"></p>
              </template>
              <template x-if="ch.is_current && ch.scenes && ch.scenes.length > 0">
                <ul class="scene-list">
                  <template x-for="(sc, si) in ch.scenes" :key="si">
                    <li class="scene-entry" :class="{ 'scene-current': sc.is_current }">
                      <span x-text="sc.title"></span>
                    </li>
                  </template>
                </ul>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <template x-if="selectedCampaignId">
      <div class="calendar-panel">
        <button
          type="button"
          class="chapters-heading"
          @click="calendarPanelOpen = !calendarPanelOpen"
          :aria-expanded="calendarPanelOpen"
          aria-controls="sidebar-calendar-list"
        >
          Calendar <small x-text="calendarPanelOpen ? '\u25B4' : '\u25BE'"></small>
        </button>
        <div x-show="calendarPanelOpen" class="calendar-list" id="sidebar-calendar-list">
          <template x-if="sidebarCalendarEvents().length === 0">
            <p class="calendar-empty">No upcoming events.</p>
          </template>
          <template x-for="(calEvt, idx) in sidebarCalendarEvents()" :key="idx">
            <div class="calendar-entry" :class="'calendar-status-' + (calEvt.status || 'upcoming')">
              <div class="calendar-entry-top">
                <span class="calendar-title" x-text="calEvt.title || calEvt.name || calEvt.event_key || 'Untitled event'"></span>
                <small class="calendar-time" x-text="calendarSidebarTimeLabel(calEvt)"></small>
              </div>
              <div class="calendar-actions">
                <button
                  type="button"
                  class="calendar-visibility-button"
                  :class="{ active: (calEvt.scope || '') === 'global' }"
                  @click="setCalendarEventVisibility(calEvt, 'public')"
                  :disabled="calendarVisibilityUpdating[calEvt.event_key || '']"
                >Public</button>
                <button
                  type="button"
                  class="calendar-visibility-button"
                  :class="{ active: (calEvt.scope || '') === 'targeted' }"
                  @click="setCalendarEventVisibility(calEvt, 'private')"
                  :disabled="calendarVisibilityUpdating[calEvt.event_key || '']"
                >Private</button>
              </div>
              <template x-if="calEvt.location">
                <p class="calendar-location" x-text="calEvt.location"></p>
              </template>
              <template x-if="calEvt.description && !calEvt.location">
                <p class="calendar-location" x-text="calEvt.description"></p>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <h2>Rooms</h2>
    <div class="stack compact">
      <div class="private-window-row">
        <select x-model="sessions.quick_private_kind" class="private-kind-select">
          <option value="solo">Solo</option>
          <option value="actor">With Actor</option>
          <option value="npc">With NPC</option>
        </select>
        <input x-model="sessions.quick_private_target" placeholder="target (optional)" class="private-target-input" x-show="sessions.quick_private_kind !== 'solo'" />
        <button type="button" @click="ensurePrivateWindow()" :disabled="!selectedCampaignId">Private</button>
      </div>
    </div>

    <div class="stack compact window-list">
      <template x-for="row in sessionsList" :key="row.id">
        <button
          type="button"
          class="campaign-button"
          :class="{ active: selectedSessionId === row.id, 'has-unseen': sessionHasUnseen(row.id) }"
          @click="selectSession(row.id)"
        >
          <span class="campaign-button-label" x-text="sessionDisplayLabel(row)"></span>
        </button>
      </template>
      <p x-show="sessionsList.length === 0 && selectedCampaignId" class="sidebar-hint">No rooms available.</p>
    </div>

    <h2>Status</h2>
    <div class="status-dots">
      <div class="status-dot-row">
        <span class="dot" :class="runtimeInfo.health_ok ? 'dot-ok' : 'dot-err'"></span>
        <span>API</span>
        <template x-if="$store.app.debugMode">
          <small x-text="runtimeInfo.health_ok ? 'healthy' : 'unreachable'"></small>
        </template>
      </div>
      <div class="status-dot-row">
        <span class="dot" :class="runtimeChecks.database && runtimeChecks.database.ok ? 'dot-ok' : 'dot-err'"></span>
        <span>DB</span>
        <template x-if="$store.app.debugMode">
          <small x-text="runtimeCheckLabel(runtimeChecks.database)"></small>
        </template>
      </div>
      <div class="status-dot-row">
        <span class="dot" :class="runtimeChecks.llm && runtimeChecks.llm.configured ? 'dot-ok' : 'dot-warn'"></span>
        <span>LLM</span>
        <template x-if="$store.app.debugMode">
          <small x-text="runtimeLlmLabel()"></small>
        </template>
      </div>
    </div>

    <!-- GPU Stats -->
    <template x-if="gpuStats.available && gpuStats.gpu">
      <div class="gpu-stats-widget">
        <div class="gpu-stats-header">
          <span class="dot dot-ok"></span>
          <span>GPU</span>
          <small x-show="gpuStats.gpu.name" x-text="gpuStats.gpu.name"></small>
        </div>
        <template x-if="gpuStats.gpu.missing_tool">
          <div class="gpu-missing-tool">
            <small x-text="gpuStats.gpu.missing_tool + ' is not installed — GPU stats unavailable.'"></small>
            <small class="gpu-missing-hint">Install via your distro package manager (e.g. <code>rocm-smi</code>).</small>
          </div>
        </template>
        <template x-if="!gpuStats.gpu.missing_tool">
        <div class="gpu-stats-bars">
          <template x-if="gpuStats.gpu.utilization_pct != null">
            <div class="gpu-stat-row">
              <span class="gpu-stat-label">Load</span>
              <div class="gpu-bar-track">
                <div class="gpu-bar-fill" :style="`width:${gpuStats.gpu.utilization_pct}%`"
                     :class="gpuStats.gpu.utilization_pct > 90 ? 'gpu-bar-hot' : ''"></div>
              </div>
              <span class="gpu-stat-value" x-text="gpuStats.gpu.utilization_pct + '%'"></span>
            </div>
          </template>
          <div class="gpu-stat-row">
            <span class="gpu-stat-label">VRAM</span>
            <div class="gpu-bar-track">
              <div class="gpu-bar-fill"
                   :style="`width:${gpuStats.gpu.vram_total_bytes ? Math.round(gpuStats.gpu.vram_used_bytes / gpuStats.gpu.vram_total_bytes * 100) : 0}%`"
                   :class="gpuStats.gpu.vram_total_bytes && gpuStats.gpu.vram_used_bytes / gpuStats.gpu.vram_total_bytes > 0.9 ? 'gpu-bar-hot' : ''"></div>
            </div>
            <span class="gpu-stat-value"
                  x-text="gpuStats.gpu.vram_total_bytes
                    ? (gpuStats.gpu.vram_used_bytes/1073741824).toFixed(1)+'/'+
                      (gpuStats.gpu.vram_total_bytes/1073741824).toFixed(0)+'G'
                    : (gpuStats.gpu.vram_used_bytes/1073741824).toFixed(1)+'G'"></span>
          </div>
          <template x-if="gpuStats.gpu.temp_c != null">
            <div class="gpu-stat-row">
              <span class="gpu-stat-label">Temp</span>
              <div class="gpu-bar-track">
                <div class="gpu-bar-fill" :style="`width:${Math.min(gpuStats.gpu.temp_c, 100)}%`"
                     :class="gpuStats.gpu.temp_c > 80 ? 'gpu-bar-hot' : ''"></div>
              </div>
              <span class="gpu-stat-value" x-text="gpuStats.gpu.temp_c + '\u00b0'"></span>
            </div>
          </template>
        </div>
        </template>
        <template x-if="gpuStats.ollama_models.length > 0">
          <div class="gpu-model-list">
            <template x-for="m in gpuStats.ollama_models" :key="m.name">
              <small class="gpu-model-tag" x-text="m.name"></small>
            </template>
          </div>
        </template>
      </div>
    </template>

    <template x-if="$store.app.debugMode">
      <div class="stack compact runtime-detail">
        <p><strong>Backend:</strong> <span x-text="runtimeInfo.gateway_backend || 'unknown'"></span></p>
        <p><strong>Mode:</strong> <span x-text="runtimeInfo.tge_completion_mode || 'n/a'"></span></p>
        <p><strong>Model:</strong> <span x-text="runtimeInfo.tge_llm_model || 'n/a'"></span></p>
        <p><strong>Base URL:</strong> <code x-text="runtimeInfo.tge_llm_base_url || 'n/a'"></code></p>
        <div class="runtime-actions">
          <button type="button" @click="loadRuntime()">Refresh Runtime</button>
          <button type="button" @click="runRuntimeChecks(true)">Run LLM Probe</button>
        </div>
      </div>
    </template>

    <!-- Song Player -->
    <template x-if="songQueue.length > 0">
      <div class="song-player">
        <div class="song-player-header">
          <button type="button" class="song-nav-btn" @click="songPrev()" :disabled="songIndex <= 0" title="Previous song">&#x25C0;</button>
          <span class="song-player-title" x-text="currentSong ? (currentSong.title || 'Unknown') : ''"></span>
          <button type="button" class="song-nav-btn" @click="songNext()" :disabled="songIndex >= songQueue.length - 1" title="Next song">&#x25B6;</button>
        </div>
        <template x-if="currentSong && currentSong.sender">
          <small class="song-sender" x-text="currentSong.sender"></small>
        </template>
        <template x-if="currentSong && currentSong.caption">
          <small class="song-caption" x-text="currentSong.caption"></small>
        </template>
        <div class="song-embed-wrap">
          <iframe
            :src="songEmbedUrl"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen
            class="song-embed"
          ></iframe>
        </div>
        <small class="song-counter" x-text="`${songIndex + 1} / ${songQueue.length}`"></small>
      </div>
    </template>
  </aside>
  <div class="sidebar-backdrop" x-show="$store.app.sidebarOpen" @click="$store.app.sidebarOpen = false" x-cloak></div>

  <!-- ====== MAIN COLUMN ====== -->
  <section class="panel main-column">

    <!-- Welcome card (first-time UX) -->
    <template x-if="campaigns.length === 0 && !selectedCampaignId">
      <div class="welcome-card">
        <h2>Create your first campaign</h2>
        <p>Click the "+" button in the sidebar to create a new campaign and begin your adventure.</p>
      </div>
    </template>

    <!-- Campaign Summary -->
    <div class="campaign-summary-bar" x-show="campaignSummary && selectedCampaignId" x-cloak>
      <details>
        <summary>Story So Far</summary>
        <p x-text="campaignSummary"></p>
      </details>
    </div>

    <!-- Turn Stream -->
    <div class="section-head">
      <h2>Turn Stream</h2>
      <small>
        <template x-if="$store.app.debugMode">
          <span x-text="selectedCampaignId ? selectedCampaignId + ' • ' : ''"></span>
        </template>
        <span x-text="selectedCampaignId ? currentSessionLabel() : 'No campaign selected'"></span>
      </small>
    </div>

    <div class="turn-stream" id="turn-stream" @click="handleTurnStreamClick($event)">
      <div x-show="_turnStreamLoadingOlder" class="turn-stream-loading">
        <small>Loading older turns...</small>
      </div>
      <template x-for="entry in visibleTurnStream()" :key="entry.id">
        <article class="turn-entry" :id="'turn-entry-' + entry.id" :class="'turn-type-' + entry.type">
          <template x-if="entry.type === 'narrator'">
            <div class="turn-narrator">
              <template x-if="!turnIsCollapsed(entry)">
                <div>
                  <template x-if="!turnIsEditing(entry)">
                    <div class="narrator-text" :class="{ 'streaming': entry._streaming, 'phase-text': entry._phaseText }" x-html="entry._streaming ? renderSimpleMarkdown(entry.text) : renderNarratorHtml(entry)"></div>
                  </template>
                  <template x-if="turnIsEditing(entry)">
                    <div class="turn-editor">
                      <textarea class="turn-editor-input" x-model="editingTurnDraft" rows="6"></textarea>
                      <div class="turn-editor-actions">
                        <button type="button" @click="saveTurnEdit(entry)" :disabled="submitting || turnMutationBusy">Save</button>
                        <button type="button" @click="cancelTurnEdit()" :disabled="turnMutationBusy">Cancel</button>
                      </div>
                    </div>
                  </template>
                  <span class="turn-footer">
                    <template x-if="entry.meta && entry.meta._game_time && entry.meta._game_time.day">
                      <small class="turn-game-time" x-text="'Day ' + entry.meta._game_time.day + ', ' + String(entry.meta._game_time.hour||0).padStart(2,'0') + ':' + String(entry.meta._game_time.minute||0).padStart(2,'0')"></small>
                    </template>
                    <small class="turn-time" x-text="entry.at"></small>
                    <template x-if="entry._backendTurnId > 0 && !entry._streaming">
                      <span class="turn-actions">
                        <button type="button" class="turn-action-btn rewind-btn" title="Rewind to this turn" aria-label="Rewind to this turn"
                          @click="rewindToTurnId(entry._backendTurnId)" :disabled="submitting">&#x23EA;</button>
                        <button type="button" class="turn-action-btn" title="Edit this turn" aria-label="Edit this turn"
                          @click="startTurnEdit(entry)" :disabled="turnMutationBusy">&#x270E;</button>
                        <button type="button" class="turn-action-btn" :title="turnIsCollapsed(entry) ? 'Show this turn' : 'Hide this turn'" :aria-label="turnIsCollapsed(entry) ? 'Show this turn' : 'Hide this turn'"
                          @click="toggleTurnCollapsed(entry)">&#x1F648;</button>
                        <button type="button" class="turn-action-btn" title="Copy turn text" aria-label="Copy turn text"
                          @click="copyTurnText(entry)">&#x1F4CB;</button>
                        <button type="button" class="turn-action-btn turn-delete-btn" title="Delete this turn" aria-label="Delete this turn"
                          @click="deleteTurnEntry(entry)" :disabled="turnMutationBusy">&#x1F5D1;</button>
                      </span>
                    </template>
                  </span>
                </div>
              </template>
              <template x-if="turnIsCollapsed(entry)">
                <div class="turn-collapsed">
                  <span>Turn collapsed</span>
                  <span class="turn-actions">
                    <button type="button" class="turn-action-btn" @click="toggleTurnCollapsed(entry)">Show</button>
                    <button type="button" class="turn-action-btn" @click="copyTurnText(entry)">Copy</button>
                  </span>
                </div>
              </template>
            </div>
          </template>
          <template x-if="entry.type === 'player'">
            <div class="turn-player" :class="{ 'turn-player-queued': turnIsQueued(entry), 'turn-player-other': turnIsOtherPlayer(entry) }">
              <template x-if="!turnIsCollapsed(entry)">
                <div class="turn-player-shell">
                  <div class="turn-player-body">
                    <span class="turn-player-actor" x-text="turnEntryActorLabel(entry)"></span>
                    <template x-if="turnIsQueued(entry)">
                      <span class="turn-player-queue-badge">Queued</span>
                    </template>
                    <template x-if="!turnIsEditing(entry)">
                      <div class="player-action-text" x-html="renderSimpleMarkdown(entry.text)"></div>
                    </template>
                    <template x-if="turnIsEditing(entry)">
                      <div class="turn-editor">
                        <textarea class="turn-editor-input" x-model="editingTurnDraft" rows="4"></textarea>
                        <div class="turn-editor-actions">
                          <button type="button" @click="saveTurnEdit(entry)" :disabled="turnIsQueued(entry) ? false : (submitting || turnMutationBusy)">Save</button>
                          <button type="button" @click="cancelTurnEdit()" :disabled="turnIsQueued(entry) ? false : turnMutationBusy">Cancel</button>
                        </div>
                      </div>
                    </template>
                  </div>
                  <div class="turn-player-meta">
                    <template x-if="entry.meta && entry.meta.pending_mention_note">
                      <small class="turn-player-footnote" x-text="entry.meta.pending_mention_note"></small>
                    </template>
                    <small class="turn-time" x-text="entry.at"></small>
                    <template x-if="entry._backendTurnId > 0 || turnIsQueued(entry)">
                      <span class="turn-actions">
                        <button type="button" class="turn-action-btn" title="Edit this turn" aria-label="Edit this turn"
                          @click="startTurnEdit(entry)" :disabled="turnMutationBusy">&#x270E;</button>
                        <button type="button" class="turn-action-btn" :title="turnIsCollapsed(entry) ? 'Show this turn' : 'Hide this turn'" :aria-label="turnIsCollapsed(entry) ? 'Show this turn' : 'Hide this turn'"
                          @click="toggleTurnCollapsed(entry)">&#x1F648;</button>
                        <button type="button" class="turn-action-btn" title="Copy turn text" aria-label="Copy turn text"
                          @click="copyTurnText(entry)">&#x1F4CB;</button>
                        <button type="button" class="turn-action-btn turn-delete-btn" :title="turnIsQueued(entry) ? 'Remove queued action' : 'Delete this turn'" :aria-label="turnIsQueued(entry) ? 'Remove queued action' : 'Delete this turn'"
                          @click="deleteTurnEntry(entry)" :disabled="turnMutationBusy">&#x1F5D1;</button>
                      </span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="turnIsCollapsed(entry)">
                <div class="turn-collapsed">
                  <span x-text="turnEntryActorLabel(entry) + ' turn collapsed'"></span>
                  <span class="turn-actions">
                    <button type="button" class="turn-action-btn" @click="toggleTurnCollapsed(entry)">Show</button>
                    <button type="button" class="turn-action-btn" @click="copyTurnText(entry)">Copy</button>
                  </span>
                </div>
              </template>
            </div>
          </template>
          <template x-if="entry.type === 'notice'">
            <div class="turn-notice">
              <span class="notice-label">Notice</span>
              <span x-text="entry.text"></span>
              <small class="turn-time" x-text="entry.at"></small>
            </div>
          </template>
          <template x-if="entry.type === 'summary'">
            <div class="turn-debug-card" x-show="$store.app.debugMode">
              <header>
                <strong>SUMMARY</strong>
                <small x-text="entry.at"></small>
              </header>
              <pre x-text="entry.text"></pre>
            </div>
          </template>
          <template x-if="entry.type === 'reasoning'">
            <div class="turn-debug-card turn-reasoning" x-show="$store.app.debugMode">
              <header>
                <strong>REASONING</strong>
                <small x-text="entry.at"></small>
              </header>
              <p class="reasoning-text" x-text="entry.text"></p>
            </div>
          </template>
          <template x-if="entry.type === 'image_prompt'">
            <div>
              <div class="scene-prompt-card" x-show="!$store.app.debugMode">
                <span class="scene-prompt-icon">&#x1f3a8;</span>
                <span class="scene-prompt-text" x-text="entry.text"></span>
                <button type="button" class="scene-prompt-gen-btn"
                  @click="generateImage(entry)"
                  :disabled="entry._imgGenerating || submitting || imageGenerating > 0"
                  x-text="entry._imgGenerating ? 'Generating...' : (entry._imgUrl ? 'Re-generate' : 'Generate')"></button>
              </div>
              <div class="turn-debug-card" x-show="$store.app.debugMode">
                <header>
                  <strong>IMAGE PROMPT</strong>
                  <small x-text="entry.at"></small>
                </header>
                <pre x-text="entry.text"></pre>
                <button type="button" class="scene-prompt-gen-btn" style="margin-top:0.35rem;"
                  @click="generateImage(entry)"
                  :disabled="entry._imgGenerating || submitting || imageGenerating > 0"
                  x-text="entry._imgGenerating ? 'Generating...' : (entry._imgUrl ? 'Re-generate' : 'Generate')"></button>
              </div>
              <template x-if="entry._imgUrl">
                <img class="scene-prompt-result" :src="entry._imgUrl" alt="Generated image" loading="lazy" />
              </template>
              <template x-if="entry._imgError">
                <p class="scene-prompt-error" x-text="entry._imgError"></p>
              </template>
            </div>
          </template>
          <template x-if="entry.type === 'dice'">
            <div class="dice-result-card" :class="entry.meta && entry.meta.success ? 'dice-success' : 'dice-fail'">
              <span class="dice-icon">&#x1f3b2;</span>
              <span class="dice-text" x-text="entry.text"></span>
              <small class="turn-time" x-text="entry.at"></small>
            </div>
          </template>
          <template x-if="['sms','media','timers','roster','session'].includes(entry.type)">
            <div class="turn-debug-card" x-show="$store.app.debugMode">
              <header>
                <strong x-text="entry.type.toUpperCase()"></strong>
                <small x-text="entry.at"></small>
              </header>
              <pre x-text="entry.text"></pre>
            </div>
          </template>
        </article>
      </template>
      <p x-show="turnStream.length === 0 && !selectedCampaignId" class="empty">No turns yet.</p>
      <p x-show="turnStream.length === 0 && selectedCampaignId && setupMode" class="empty">Your campaign is ready for setup. Open <strong>Config</strong> from the sidebar to continue.</p>
      <p x-show="turnStream.length === 0 && selectedCampaignId && !setupMode" class="empty">Type an action below to begin your adventure.</p>
    </div>

    <!-- Character HUD + Action Bar -->
    <div class="action-bar-wrapper">
      <template x-if="playerData?.state?.avatar_url">
        <img :src="playerData?.state?.avatar_url" :alt="resolveCharacterName('') + ' avatar'" class="action-bar-avatar" />
      </template>
      <div class="action-bar-column">
        <template x-if="showComposerHud()">
          <div class="char-hud">
            <div class="char-hud-top">
              <strong class="char-hud-name" x-text="resolveCharacterName()"></strong>
              <select x-show="uniqueActors().length > 1" x-model="turnForm.actor_id" @change="handleActorIdentityChange()" class="actor-select">
                <template x-for="actor in uniqueActors()" :key="actor">
                  <option :value="actor" x-text="actor"></option>
                </template>
              </select>
            </div>
            <template x-if="playerData">
              <div class="char-hud-stats">
                <span class="xp-level">Lv <span x-text="playerData.level || 1"></span></span>
                <div class="xp-bar-track char-hud-xp">
                  <div class="xp-bar-fill" :style="'width:' + Math.min(100, ((playerData.xp || 0) % 100)) + '%'"></div>
                </div>
                <span class="xp-value" x-text="(playerData.xp || 0) + ' XP'"></span>
              </div>
            </template>
            <template x-if="playerData?.state?.room_title">
              <span class="char-hud-location" x-text="playerData?.state?.room_title"></span>
            </template>
          </div>
        </template>
        <form class="action-bar" @submit.prevent="submitTurn()">
          <span class="action-prompt">&gt;</span>
          <div class="action-input-shell">
            <textarea
              x-model="turnForm.action"
              placeholder="What do you do?"
              class="action-input"
              required
              id="action-input"
              rows="1"
              @keydown="handleComposerKeydown($event)"
              @input="
                const _ts = document.getElementById('turn-stream');
                const _bOff = _ts ? (_ts.scrollHeight - _ts.scrollTop - _ts.clientHeight) : 0;
                if (!CSS.supports('field-sizing','content')) { $el.style.height = '0'; $el.style.height = $el.scrollHeight + 'px'; }
                requestAnimationFrame(() => { if (_ts) _ts.scrollTop = _ts.scrollHeight - _ts.clientHeight - _bOff; });
                updateMentionAutocomplete($event);
              "
              @click="updateMentionAutocomplete($event)"
              @keyup="updateMentionAutocomplete($event)"
              @focus="ensureComposerVisible()"
              @blur="setTimeout(() => closeMentionAutocomplete(), 120)"
            ></textarea>
            <template x-if="composerMentionActive()">
              <div class="mention-menu">
                <template x-for="(candidate, index) in filteredMentionCandidates()" :key="candidate.actor_id">
                  <button
                    type="button"
                    class="mention-option"
                    :class="{ active: mentionState.selectedIndex === index }"
                    @mousedown.prevent="applyMentionCandidate(candidate)"
                  >
                    <span class="mention-option-name" x-text="candidate.name"></span>
                    <span class="mention-option-id" x-text="'@' + candidate.actor_id"></span>
                  </button>
                </template>
              </div>
            </template>
          </div>
          <button
            type="submit"
            :disabled="!selectedCampaignId || imageGenerating > 0"
            class="action-submit"
            :class="{ 'action-thinking': imageGenerating > 0 }"
            x-text="submitButtonLabel()"
          ></button>
        </form>
      </div>
    </div>

    <p class="status" x-text="statusMessage"></p>
    <p class="error" x-show="errorMessage" x-text="errorMessage" @click="errorMessage = ''" title="Click to dismiss"></p>

    <!-- Inspector Panel (debug mode only) -->
    <template x-if="$store.app.debugMode">
    <div class="inspector-panel">
      <div class="tab-row">
        <button type="button" @click="inspectorTab = 'map'" :class="{ active: inspectorTab === 'map' }">Map</button>
        <button type="button" @click="inspectorTab = 'player'" :class="{ active: inspectorTab === 'player' }">Player</button>
        <button type="button" @click="inspectorTab = 'campaign'" :class="{ active: inspectorTab === 'campaign' }">Campaign</button>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'history'" :class="{ active: inspectorTab === 'history' }">History</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'story'" :class="{ active: inspectorTab === 'story' }">Story</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'sessions'" :class="{ active: inspectorTab === 'sessions' }">Sessions</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'timers'" :class="{ active: inspectorTab === 'timers' }">Timers</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'calendar'" :class="{ active: inspectorTab === 'calendar' }">Calendar</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'roster'" :class="{ active: inspectorTab === 'roster' }">Roster</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'media'" :class="{ active: inspectorTab === 'media' }">Media</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'memory'" :class="{ active: inspectorTab === 'memory' }">Memory</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'sms'" :class="{ active: inspectorTab === 'sms' }">SMS</button>
        </template>
        <template x-if="$store.app.debugMode">
          <button type="button" @click="inspectorTab = 'debug'" :class="{ active: inspectorTab === 'debug' }">Debug</button>
        </template>
      </div>

      <div x-show="inspectorTab === 'map'" class="stack">
        <button type="button" @click="loadMap()" :disabled="!selectedCampaignId">Refresh Map</button>
        <pre x-text="mapText"></pre>
      </div>

      <div x-show="inspectorTab === 'player'" class="stack">
        <button type="button" @click="loadPlayerState()" :disabled="!selectedCampaignId">Refresh</button>
        <template x-if="playerData">
          <div class="player-card">
            <!-- Avatar + Identity -->
            <div class="player-identity">
              <template x-if="playerData?.state?.avatar_url">
                <img :src="playerData?.state?.avatar_url" :alt="'Avatar of ' + resolveCharacterName('character')" class="player-avatar" />
              </template>
              <div>
                <strong x-text="resolveCharacterName()"></strong>
                <template x-if="playerData?.state?.room_title">
                  <span class="player-location" x-text="playerData?.state?.room_title"></span>
                </template>
              </div>
            </div>
            <form class="attr-set-form" @submit.prevent="renamePlayerCharacter()">
              <input x-model="characterNameForm.value" placeholder="Character name" class="attr-input" maxlength="128" />
              <button type="submit" :disabled="!selectedCampaignId || !(turnForm.actor_id || '').trim() || !(characterNameForm.value || '').trim() || characterNameSaving" x-text="characterNameSaving ? 'Saving...' : 'Rename'"></button>
            </form>
            <p x-show="characterNameStatus" x-text="characterNameStatus" class="muted"></p>
            <!-- XP Bar -->
            <div class="xp-row">
              <span class="xp-level">Lv <span x-text="playerData.level || 1"></span></span>
              <div class="xp-bar-track">
                <div class="xp-bar-fill" :style="'width:' + Math.min(100, ((playerData.xp || 0) % 100)) + '%'"></div>
              </div>
              <span class="xp-value" x-text="(playerData.xp || 0) + ' XP'"></span>
            </div>
            <!-- Statistics -->
            <template x-if="playerStats">
              <div class="player-stats-row">
                <span class="stat-pill" x-show="typeof playerStats?.messages_sent === 'number'">&#x1f4ac; <span x-text="playerStats?.messages_sent"></span> msgs</span>
                <span class="stat-pill" x-show="typeof playerStats?.timers_averted === 'number'">&#x2705; <span x-text="playerStats?.timers_averted"></span> averted</span>
                <span class="stat-pill" x-show="typeof playerStats?.timers_missed === 'number'">&#x274c; <span x-text="playerStats?.timers_missed"></span> missed</span>
                <span class="stat-pill" x-show="typeof playerStats?.attention_hours === 'number'">&#x23f1; <span x-text="Number(playerStats?.attention_hours || 0).toFixed(1)"></span>h</span>
              </div>
            </template>
            <!-- Attributes -->
            <template x-if="playerAttributes?.attributes && Object.keys(playerAttributes?.attributes || {}).length > 0">
              <div class="player-attributes">
                <div class="attr-header">
                  <strong>Attributes</strong>
                  <small x-text="(playerAttributes?.points_available || 0) + ' / ' + (playerAttributes?.total_points || 0) + ' pts available'"></small>
                </div>
                <div class="attr-grid">
                  <template x-for="[name, val] in Object.entries(playerAttributes?.attributes || {})" :key="name">
                    <div class="attr-row">
                      <span class="attr-name" x-text="name"></span>
                      <div class="attr-bar-track">
                        <div class="attr-bar-fill" :style="'width:' + Math.min(100, (val / (playerAttributes?.max_attribute_value || 20)) * 100) + '%'"></div>
                      </div>
                      <span class="attr-value" x-text="val"></span>
                    </div>
                  </template>
                </div>
                <template x-if="playerAttributes?.points_available > 0">
                  <form class="attr-set-form" @submit.prevent="setPlayerAttribute()">
                    <input x-model="attributeForm.attribute" placeholder="attribute" class="attr-input" />
                    <input x-model.number="attributeForm.value" type="number" min="0" :max="playerAttributes?.max_attribute_value || 20" class="attr-input attr-input-num" />
                    <button type="submit">Set</button>
                  </form>
                </template>
              </div>
            </template>
            <!-- Level Up -->
            <template x-if="playerAttributes">
              <div class="level-up-row">
                <span class="xp-needed" x-text="'Next level: ' + (playerAttributes?.xp_needed_for_next || '?') + ' XP'"></span>
                <button type="button" @click="levelUpPlayer()" :disabled="!playerAttributes || (playerAttributes?.xp || 0) < (playerAttributes?.xp_needed_for_next || 999999)" class="btn-level-up">Level Up</button>
              </div>
            </template>
            <!-- Location -->
            <template x-if="playerData?.state?.room_description">
              <p class="player-room-desc" x-text="playerData?.state?.room_description"></p>
            </template>
            <!-- Inventory -->
            <template x-if="playerData?.inventory?.length > 0">
              <div class="player-inventory">
                <strong>Inventory</strong>
                <ul>
                  <template x-for="(item, idx) in (playerData?.inventory || [])" :key="idx">
                    <li x-text="typeof item === 'string' ? item : (item.name || item.item || JSON.stringify(item))"></li>
                  </template>
                </ul>
              </div>
            </template>
            <!-- Pending Avatar -->
            <template x-if="playerData?.state?.pending_avatar_url">
              <div class="pending-avatar">
                <p>Pending Avatar:</p>
                <img :src="playerData?.state?.pending_avatar_url" :alt="'Pending avatar preview for ' + resolveCharacterName('character')" class="player-avatar pending" />
                <div class="inline-actions">
                  <button type="button" @click="acceptPendingAvatar()">Accept</button>
                  <button type="button" @click="declinePendingAvatar()">Decline</button>
                </div>
              </div>
            </template>
            <!-- Set Portrait -->
            <details class="source-upload-details">
              <summary>Set Portrait</summary>
              <form class="stack compact" @submit.prevent="recordCharacterPortrait()">
                <label>
                  Character Slug
                  <input x-model="portraitForm.slug" :placeholder="playerData.actor_id || 'character-slug'" />
                </label>
                <label>
                  Image URL
                  <input x-model="portraitForm.image_url" placeholder="https://..." />
                </label>
                <button type="submit" :disabled="!selectedCampaignId || !portraitForm.slug.trim() || !portraitForm.image_url.trim()">Set Portrait</button>
                <p x-show="portraitStatus" x-text="portraitStatus" class="muted"></p>
              </form>
            </details>
            <!-- Generate Avatar -->
            <details class="source-upload-details">
              <summary>Generate Avatar</summary>
              <form class="stack compact" @submit.prevent="generateAvatar()">
                <label>
                  Avatar Prompt
                  <textarea x-model="avatarGenPrompt" rows="2" placeholder="A portrait of a rugged adventurer with short brown hair, wearing leather armor..."></textarea>
                </label>
                <button type="submit" :disabled="!selectedCampaignId || !avatarGenPrompt.trim() || avatarGenBusy" x-text="avatarGenBusy ? avatarGenStatus : 'Generate Avatar'"></button>
                <p x-show="avatarGenStatus && !avatarGenBusy" x-text="avatarGenStatus" class="muted"></p>
              </form>
            </details>
            <!-- Raw state (debug) -->
            <template x-if="$store.app.debugMode">
              <details>
                <summary>Raw State</summary>
                <pre x-text="playerStateText"></pre>
              </details>
            </template>
          </div>
        </template>
        <template x-if="!playerData">
          <p class="muted">Select a campaign and actor to view player state.</p>
        </template>
      </div>

      <!-- Campaign Flags & Source Material -->
      <div x-show="inspectorTab === 'campaign'" class="stack">
        <template x-if="inspectorTab === 'campaign'">
          <div class="stack">

            <!-- Campaign Setup Wizard -->
            <template x-if="setupMode">
              <div class="setup-wizard">
                <div class="setup-wizard-header">
                  <h4>Campaign Setup</h4>
                  <span class="setup-phase-badge" x-text="setupPhase || 'starting'"></span>
                </div>
                <template x-if="!setupPhase || setupPhase === 'none'">
                  <div class="setup-start-controls">
                    <p>This campaign is ready for guided setup. The narrator will help you create your world.</p>
                    <label class="flag-toggle">
                      <input type="checkbox" x-model="setupOnRails" />
                      <span>On Rails <small>(follow a structured storyline)</small></span>
                    </label>
                    <details class="setup-attachment-details">
                      <summary>Attach Reference Text</summary>
                      <textarea x-model="setupAttachmentText" rows="4" placeholder="Paste lore, setting notes, or a story premise..."></textarea>
                    </details>
                    <button type="button" @click="startCampaignSetup()" :disabled="!selectedCampaignId" class="btn-setup-start">Begin Setup</button>
                  </div>
                </template>
                <template x-if="setupPhase && setupPhase !== 'none' && setupPhase !== 'completed'">
                  <div class="setup-conversation">
                    <template x-if="setupResponse">
                      <div class="setup-response-card">
                        <p x-text="setupResponse"></p>
                      </div>
                    </template>
                    <form class="setup-message-form" @submit.prevent="sendSetupMessage()">
                      <input x-model="setupMessage" placeholder="Your response..." :disabled="setupSending" class="setup-message-input" />
                      <button type="submit" :disabled="!setupMessage.trim() || setupSending">
                        <span x-show="!setupSending">Send</span>
                        <span x-show="setupSending">...</span>
                      </button>
                    </form>
                  </div>
                </template>
                <template x-if="setupPhase === 'completed'">
                  <div class="setup-complete-card">
                    <p>Setup complete! Your campaign world has been created. Submit your first action to begin playing.</p>
                  </div>
                </template>
              </div>
            </template>

            <!-- Scene Images -->
            <template x-if="Object.keys(sceneImages).length > 0">
              <div class="scene-images-panel">
                <h4>Scene Images</h4>
                <div class="scene-images-grid">
                  <template x-for="[room, url] in Object.entries(sceneImages)" :key="room">
                    <div class="scene-image-card">
                      <img :src="url" :alt="'Scene: ' + room" loading="lazy" />
                      <small x-text="room"></small>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Literary Styles -->
            <template x-if="Object.keys(literaryStyles).length > 0">
              <div class="literary-styles-panel">
                <h4>Literary Styles</h4>
                <div class="literary-styles-list">
                  <template x-for="[name, profile] in Object.entries(literaryStyles)" :key="name">
                    <details class="literary-style-item">
                      <summary x-text="name"></summary>
                      <p class="literary-style-profile" x-text="typeof profile === 'string' ? profile : JSON.stringify(profile, null, 2)"></p>
                    </details>
                  </template>
                </div>
              </div>
            </template>

            <div class="campaign-flags" x-init="loadCampaignFlags()">
              <h4>Campaign Flags</h4>
              <label class="flag-toggle">
                <input type="checkbox" :checked="campaignFlags.guardrails" @change="setCampaignFlag('guardrails', $event.target.checked)" :disabled="!selectedCampaignId" />
                <span>Guardrails <small>(content safety)</small></span>
              </label>
              <label class="flag-toggle">
                <input type="checkbox" :checked="campaignFlags.on_rails" @change="setCampaignFlag('on_rails', $event.target.checked)" :disabled="!selectedCampaignId" />
                <span>On Rails <small>(story outline progression)</small></span>
              </label>
              <label class="flag-toggle">
                <input type="checkbox" :checked="campaignFlags.timed_events" @change="setCampaignFlag('timed_events', $event.target.checked)" :disabled="!selectedCampaignId" />
                <span>Timed Events</span>
              </label>
              <label>
                Difficulty
                <select :value="campaignFlags.difficulty" @change="setCampaignFlag('difficulty', $event.target.value)" :disabled="!selectedCampaignId">
                  <option value="story">Story</option>
                  <option value="easy">Easy</option>
                  <option value="medium">Medium</option>
                  <option value="normal">Normal</option>
                  <option value="hard">Hard</option>
                  <option value="impossible">Impossible</option>
                </select>
              </label>
              <label>
                Speed Multiplier
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                  <input type="range" min="0.1" max="5" step="0.1" :value="campaignFlags.speed_multiplier" @change="setCampaignFlag('speed_multiplier', parseFloat($event.target.value))" :disabled="!selectedCampaignId" style="flex:1" />
                  <span x-text="Number(campaignFlags.speed_multiplier || 1).toFixed(1)" style="min-width:2rem; text-align:right;"></span>
                </div>
              </label>
              <label>
                Clock Start Day
                <select :value="campaignFlags.clock_start_day_of_week" @change="setCampaignFlag('clock_start_day_of_week', $event.target.value)" :disabled="!selectedCampaignId">
                  <option value="monday">Monday</option>
                  <option value="tuesday">Tuesday</option>
                  <option value="wednesday">Wednesday</option>
                  <option value="thursday">Thursday</option>
                  <option value="friday">Friday</option>
                  <option value="saturday">Saturday</option>
                  <option value="sunday">Sunday</option>
                </select>
              </label>
              <label>
                Clock Model
                <select :value="campaignFlags.clock_type" @change="setCampaignFlag('clock_type', $event.target.value)" :disabled="!selectedCampaignId">
                  <option value="consequential-calendar">Shared &mdash; Consequential</option>
                  <option value="loose-calendar">Shared &mdash; Loose</option>
                  <option value="individual-calendars">Individual Clocks</option>
                </select>
              </label>
            </div>

            <!-- Persona -->
            <div class="campaign-persona">
              <h4>Narrator Persona</h4>
              <template x-if="campaignPersona">
                <div>
                  <p class="persona-text" x-text="campaignPersona"></p>
                  <small class="persona-source" x-text="'Source: ' + (campaignPersonaSource || 'default')"></small>
                </div>
              </template>
              <template x-if="!campaignPersona">
                <p class="muted">Using default narrator persona.</p>
              </template>
              <details class="persona-edit-details">
                <summary>Edit Persona</summary>
                <form class="stack compact" @submit.prevent="setCampaignPersona()">
                  <textarea x-model="personaEditText" rows="3" placeholder="Describe the narrator voice (max 140 chars)" maxlength="140"></textarea>
                  <div style="display:flex; gap:0.5rem; align-items:center;">
                    <button type="submit" :disabled="!selectedCampaignId || !personaEditText.trim()">Save Persona</button>
                    <small x-text="(personaEditText || '').length + '/140'"></small>
                  </div>
                </form>
              </details>
            </div>

            <hr />

            <div class="source-material">
              <h4>Source Material</h4>
              <button type="button" @click="loadSourceMaterials()" :disabled="!selectedCampaignId">Refresh</button>
              <template x-if="sourceMaterials.length > 0">
                <ul class="source-docs-list">
                  <template x-for="doc in sourceMaterials" :key="doc.document_key">
                    <li>
                      <strong x-text="doc.document_label || doc.document_key"></strong>
                      <span x-text="'(' + (doc.format || 'generic') + ', ' + (doc.chunk_count || 0) + ' chunks)'"></span>
                    </li>
                  </template>
                </ul>
              </template>
              <template x-if="sourceMaterials.length === 0">
                <p class="muted">No source materials uploaded.</p>
              </template>
              <details class="source-upload-details">
                <summary>Upload Source Material</summary>
                <form class="stack compact" @submit.prevent="ingestSourceMaterial()">
                  <label>
                    Label (optional)
                    <input x-model="sourceUpload.label" placeholder="My Rulebook" />
                  </label>
                  <label>
                    Format
                    <select x-model="sourceUpload.format">
                      <option value="">Auto-detect</option>
                      <option value="story">Story / Prose</option>
                      <option value="rulebook">Rulebook</option>
                      <option value="generic">Generic / Notes</option>
                    </select>
                  </label>
                  <label>
                    Text Content
                    <textarea x-model="sourceUpload.text" rows="6" placeholder="Paste source material here..."></textarea>
                  </label>
                  <label class="checkbox-label">
                    <input type="checkbox" x-model="sourceUpload.replace" />
                    Replace existing document
                  </label>
                  <button type="submit" :disabled="!selectedCampaignId || !sourceUpload.text.trim()">Upload</button>
                  <p x-show="sourceUploadStatus" x-text="sourceUploadStatus" class="muted"></p>
                </form>
              </details>
              <details class="source-upload-details">
                <summary>Search Source Material</summary>
                <form class="stack compact" @submit.prevent="searchSourceMaterial()">
                  <div class="source-search-row">
                    <input x-model="sourceSearchQuery" placeholder="Search query..." class="source-search-input" />
                    <input x-model="sourceSearchDocKey" placeholder="Doc key (optional)" class="source-search-dockey" />
                    <button type="submit" :disabled="!selectedCampaignId || !sourceSearchQuery.trim() || sourceSearching">Search</button>

                </form>
                <template x-if="sourceSearchResults.length > 0">
                  <div class="source-search-results">

                          <small x-text="hit.document_label || hit.document_key"></small>
                          <small class="source-hit-score" x-text="'score: ' + hit.score"></small>
                        </div>
                        <p class="source-hit-text" x-text="hit.text"></p>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="sourceSearchResults.length === 0 && sourceSearchQuery.trim()">
                  <p class="muted">No results.</p>
                </template>
              </details>
              <details class="source-upload-details">
                <summary>Upload with Digest</summary>
                <form class="stack compact" @submit.prevent="ingestWithDigest()">
                  <label>
                    Label
                    <input x-model="digestUpload.label" placeholder="Story of the Northern Realms" required />
                  </label>
                  <label>
