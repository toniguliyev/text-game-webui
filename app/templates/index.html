                  </template>
                  <div>
                    <strong x-text="resolveCharacterName()"></strong>
                    <template x-if="playerData?.state?.room_title">
                      <span class="player-location" x-text="playerData?.state?.room_title"></span>
                    </template>
                  </div>
                </div>
                <form class="attr-set-form" @submit.prevent="renamePlayerCharacter()">
                  <input x-model="characterNameForm.value" placeholder="Character name" class="attr-input" maxlength="128" />
                  <button type="submit" :disabled="!selectedCampaignId || !(turnForm.actor_id || '').trim() || !(characterNameForm.value || '').trim() || characterNameSaving" x-text="characterNameSaving ? 'Saving...' : 'Rename'"></button>
                </form>
                <p x-show="characterNameStatus" x-text="characterNameStatus" class="muted"></p>
                <div class="xp-row">
                  <span class="xp-level">Lv <span x-text="playerData.level || 1"></span></span>
                  <div class="xp-bar-track"><div class="xp-bar-fill" :style="'width:' + Math.min(100, ((playerData.xp || 0) % 100)) + '%'"></div></div>
                  <span class="xp-value" x-text="(playerData.xp || 0) + ' XP'"></span>
                </div>
                <template x-if="playerStats">
                  <div class="player-stats-row">
                    <span class="stat-pill" x-show="typeof playerStats?.messages_sent === 'number'">&#x1f4ac; <span x-text="playerStats?.messages_sent"></span> msgs</span>
                    <span class="stat-pill" x-show="typeof playerStats?.timers_averted === 'number'">&#x2705; <span x-text="playerStats?.timers_averted"></span> averted</span>
                    <span class="stat-pill" x-show="typeof playerStats?.timers_missed === 'number'">&#x274c; <span x-text="playerStats?.timers_missed"></span> missed</span>
                    <span class="stat-pill" x-show="typeof playerStats?.attention_hours === 'number'">&#x23f1; <span x-text="Number(playerStats?.attention_hours || 0).toFixed(1)"></span>h</span>
                  </div>
                </template>
                <template x-if="playerAttributes?.attributes && Object.keys(playerAttributes?.attributes || {}).length > 0">
                  <div class="player-attributes">
                    <div class="attr-header">
                      <strong>Attributes</strong>
                      <small x-text="(playerAttributes?.points_available || 0) + ' / ' + (playerAttributes?.total_points || 0) + ' pts available'"></small>
                    </div>
                    <div class="attr-grid">
                      <template x-for="[name, val] in Object.entries(playerAttributes?.attributes || {})" :key="name">
                        <div class="attr-row">
                          <span class="attr-name" x-text="name"></span>
                          <div class="attr-bar-track"><div class="attr-bar-fill" :style="'width:' + Math.min(100, (val / (playerAttributes?.max_attribute_value || 20)) * 100) + '%'"></div></div>
                          <span class="attr-value" x-text="val"></span>
                        </div>
                      </template>
                    </div>
                    <template x-if="playerAttributes?.points_available > 0">
                      <form class="attr-set-form" @submit.prevent="setPlayerAttribute()">
                        <input x-model="attributeForm.attribute" placeholder="attribute" class="attr-input" />
                        <input x-model.number="attributeForm.value" type="number" min="0" :max="playerAttributes?.max_attribute_value || 20" class="attr-input attr-input-num" />
                        <button type="submit">Set</button>
                      </form>
                    </template>
                  </div>
                </template>
                <template x-if="playerAttributes">
                  <div class="level-up-row">
                    <span class="xp-needed" x-text="'Next level: ' + (playerAttributes?.xp_needed_for_next || '?') + ' XP'"></span>
                    <button type="button" @click="levelUpPlayer()" :disabled="!playerAttributes || (playerAttributes?.xp || 0) < (playerAttributes?.xp_needed_for_next || 999999)" class="btn-level-up">Level Up</button>
                  </div>
                </template>
                <template x-if="playerData?.state?.room_description">
                  <p class="player-room-desc" x-text="playerData?.state?.room_description"></p>
                </template>
                <template x-if="playerData?.inventory?.length > 0">
                  <div class="player-inventory">
                    <strong>Inventory</strong>
                    <ul>
                      <template x-for="(item, idx) in (playerData?.inventory || [])" :key="idx">
                        <li x-text="typeof item === 'string' ? item : (item.name || item.item || JSON.stringify(item))"></li>
                      </template>
                    </ul>
                  </div>
                </template>
                <template x-if="playerData?.state?.pending_avatar_url">
                  <div class="pending-avatar">
                    <p>Pending Avatar:</p>
                    <img :src="playerData?.state?.pending_avatar_url" :alt="'Pending avatar'" class="player-avatar pending" />
                    <div class="inline-actions">
                      <button type="button" @click="acceptPendingAvatar()">Accept</button>
                      <button type="button" @click="declinePendingAvatar()">Decline</button>
                    </div>
                  </div>
                </template>
                <details class="source-upload-details">
                  <summary>Set Portrait</summary>
                  <form class="stack compact" @submit.prevent="recordCharacterPortrait()">
                    <label>Character Slug<input x-model="portraitForm.slug" :placeholder="playerData.actor_id || 'character-slug'" /></label>
                    <label>Image URL<input x-model="portraitForm.image_url" placeholder="https://..." /></label>
                    <button type="submit" :disabled="!selectedCampaignId || !portraitForm.slug.trim() || !portraitForm.image_url.trim()">Set Portrait</button>
                    <p x-show="portraitStatus" x-text="portraitStatus" class="muted"></p>
                  </form>
                </details>
                <details class="source-upload-details">
                  <summary>Generate Avatar</summary>
                  <form class="stack compact" @submit.prevent="generateAvatar()">
                    <label>Avatar Prompt<textarea x-model="avatarGenPrompt" rows="2" placeholder="A portrait of a rugged adventurer..."></textarea></label>
                    <button type="submit" :disabled="!selectedCampaignId || !avatarGenPrompt.trim() || avatarGenBusy" x-text="avatarGenBusy ? avatarGenStatus : 'Generate Avatar'"></button>
                    <p x-show="avatarGenStatus && !avatarGenBusy" x-text="avatarGenStatus" class="muted"></p>
                  </form>
                </details>
              </div>
            </template>
            <template x-if="!playerData">
              <p class="muted">Select a campaign and actor to view player state.</p>
            </template>
          </div>
        </div>
      </template>

      <!-- ---- Map View Modal ---- -->
      <template x-if="$store.app.modal === 'mapView'">
        <div class="modal-panel modal-panel--lg" x-init="loadMap()">
          <div class="modal-header">
            <h3>Map</h3>
            <button type="button" class="modal-close" @click="$store.app.closeModal()">&times;</button>
          </div>
          <div class="modal-body">
            <button type="button" @click="loadMap()" :disabled="!selectedCampaignId" style="margin-bottom:0.5rem;">Refresh Map</button>
            <pre x-text="mapText"></pre>
          </div>
        </div>
      </template>

      <!-- ---- Campaign Config Modal ---- -->
      <template x-if="$store.app.modal === 'campaignConfig'">
        <div class="modal-panel modal-panel--lg" x-init="loadCampaignFlags(); loadCampaignPersona(); loadSourceMaterials(); loadCampaignRules(); loadSceneImages(); loadLiteraryStyles()">
          <div class="modal-header">
            <h3>Campaign Config</h3>
            <button type="button" class="modal-close" @click="$store.app.closeModal()">&times;</button>
          </div>
          <div class="modal-body">
            <div class="config-tabs">
              <button type="button" class="config-tab" :class="{ active: campaignConfigTab === 'general' }" @click="campaignConfigTab = 'general'">General</button>
              <button type="button" class="config-tab" :class="{ active: campaignConfigTab === 'narrator' }" @click="campaignConfigTab = 'narrator'">Narrator</button>
              <button type="button" class="config-tab" :class="{ active: campaignConfigTab === 'source' }" @click="campaignConfigTab = 'source'">Source Material</button>
              <button type="button" class="config-tab" :class="{ active: campaignConfigTab === 'rules' }" @click="campaignConfigTab = 'rules'">Rules</button>
            </div>

            <!-- General sub-tab -->
            <div x-show="campaignConfigTab === 'general'" class="stack">
              <template x-if="setupMode">
                <div class="setup-wizard">
                  <div class="setup-wizard-header">
                    <h4>Campaign Setup</h4>
                    <span class="setup-phase-badge" x-text="setupPhase || 'starting'"></span>
                  </div>
                  <template x-if="!setupPhase || setupPhase === 'none'">
                    <div class="setup-start-controls">
                      <p>This campaign is ready for guided setup.</p>
                      <label class="flag-toggle">
                        <input type="checkbox" x-model="setupOnRails" />
                        <span>On Rails <small>(follow a structured storyline)</small></span>
                      </label>
                      <details class="setup-attachment-details">
                        <summary>Attach Reference Text</summary>
                        <textarea x-model="setupAttachmentText" rows="4" placeholder="Paste lore, setting notes, or a story premise..."></textarea>
                      </details>
                      <button type="button" @click="startCampaignSetup()" :disabled="!selectedCampaignId" class="btn-setup-start">Begin Setup</button>
                    </div>
                  </template>
                  <template x-if="setupPhase && setupPhase !== 'none' && setupPhase !== 'completed'">
                    <div class="setup-conversation">
                      <template x-if="setupResponse">
                        <div class="setup-response-card"><p x-text="setupResponse"></p></div>
                      </template>
                      <form class="setup-message-form" @submit.prevent="sendSetupMessage()">
                        <input x-model="setupMessage" placeholder="Your response..." :disabled="setupSending" class="setup-message-input" />
                        <button type="submit" :disabled="!setupMessage.trim() || setupSending">
                          <span x-show="!setupSending">Send</span>
                          <span x-show="setupSending">...</span>
                        </button>
                      </form>
                    </div>
                  </template>
                  <template x-if="setupPhase === 'completed'">
                    <div class="setup-complete-card"><p>Setup complete! Submit your first action to begin playing.</p></div>
                  </template>
                </div>
              </template>

              <div class="campaign-flags">
                <h4>Campaign Flags</h4>
                <label class="flag-toggle">
                  <input type="checkbox" :checked="campaignFlags.guardrails" @change="setCampaignFlag('guardrails', $event.target.checked)" :disabled="!selectedCampaignId" />
                  <span>Guardrails</span>
                </label>
                <small class="flag-hint">Filters graphic violence and sexual content from narration. Disable for darker or mature-themed campaigns.</small>

                <label class="flag-toggle">
                  <input type="checkbox" :checked="campaignFlags.on_rails" @change="setCampaignFlag('on_rails', $event.target.checked)" :disabled="!selectedCampaignId" />
                  <span>On Rails</span>
                </label>
                <small class="flag-hint">Narrator follows a chapter-by-chapter plot outline generated during setup. Disable for full sandbox.</small>

                <label class="flag-toggle">
                  <input type="checkbox" :checked="campaignFlags.timed_events" @change="setCampaignFlag('timed_events', $event.target.checked)" :disabled="!selectedCampaignId" />
                  <span>Timed Events</span>
                </label>
                <small class="flag-hint">Lets the narrator schedule real-time countdowns. If you don't act before one expires, the event fires on its own (e.g. a guard patrol arriving, a bomb detonating).</small>

                <label>
                  Difficulty
                  <select :value="campaignFlags.difficulty" @change="setCampaignFlag('difficulty', $event.target.value)" :disabled="!selectedCampaignId">
                    <option value="story">Story</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="normal">Normal</option>
                    <option value="hard">Hard</option>
                    <option value="impossible">Impossible</option>
                  </select>
                </label>
                <small class="flag-hint" x-text="{
                  story: 'Dream mode. Defaults to success, softens failure states, keeps progress flowing even after weak or vague actions.',
                  easy: 'Forgiving and player-favoring. Allows broad creative actions, mild consequences, helpful affordances when underspecified.',
                  medium: 'Balanced challenge with lenient interpretation. Plausible actions required, but frequent partial successes and recovery paths.',
                  normal: 'Standard difficulty. Fair consequences, reasonable challenge.',
                  hard: 'Demands strong grounding. Enforces constraints, resources, and consequences; failed or risky actions cost something.',
                  impossible: 'Unforgiving. Resources scarce, NPCs self-interested, mistakes have lasting consequences. Movement restricted to listed exits.',
                }[campaignFlags.difficulty || 'normal'] || ''"></small>

                <label>
                  Speed Multiplier
                  <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="range" min="0.1" max="5" step="0.1" :value="campaignFlags.speed_multiplier" @change="setCampaignFlag('speed_multiplier', parseFloat($event.target.value))" :disabled="!selectedCampaignId" style="flex:1" />
                    <span x-text="Number(campaignFlags.speed_multiplier || 1).toFixed(1)" style="min-width:2rem; text-align:right;"></span>
                  </div>
                </label>
                <small class="flag-hint">Scales how many in-game hours pass per turn. Crank it up for travel montages, lower it for tense scenes.</small>

                <label>
                  Clock Start Day
                  <select :value="campaignFlags.clock_start_day_of_week" @change="setCampaignFlag('clock_start_day_of_week', $event.target.value)" :disabled="!selectedCampaignId">
                    <option value="monday">Monday</option>
                    <option value="tuesday">Tuesday</option>
                    <option value="wednesday">Wednesday</option>
                    <option value="thursday">Thursday</option>
                    <option value="friday">Friday</option>
                    <option value="saturday">Saturday</option>
                    <option value="sunday">Sunday</option>
                  </select>
                </label>
                <small class="flag-hint">Which real-world day of the week the in-game calendar starts on. Only matters when the game clock tracks days.</small>

                <label>
                  Clock Model
                  <select :value="campaignFlags.clock_type" @change="setCampaignFlag('clock_type', $event.target.value)" :disabled="!selectedCampaignId">
                    <option value="consequential-calendar">Shared &mdash; Consequential</option>
                    <option value="loose-calendar">Shared &mdash; Loose</option>
                    <option value="individual-calendars">Individual Clocks</option>
                  </select>
                </label>
                <small class="flag-hint">Shared clocks advance together for all players. Consequential means missed appointments stay missed; loose reschedules them. Individual gives each player their own timeline.</small>
              </div>
            </div>

            <!-- Narrator sub-tab -->
            <div x-show="campaignConfigTab === 'narrator'" class="stack">
              <div class="campaign-persona">
                <h4>Character Persona</h4>
                <small class="flag-hint" style="margin-left:0;">Describes your character's demeanour, voice, and visible style. The narrator and NPCs use this to portray how others perceive and react to you. Max 140 characters, capped at 18 words in prompts.</small>
                <template x-if="campaignPersona">
                  <div>
                    <p class="persona-text" x-text="campaignPersona"></p>
                    <small class="persona-source" x-text="'Source: ' + (campaignPersonaSource || 'default')"></small>
                  </div>
                </template>
                <template x-if="!campaignPersona">
                  <p class="muted">Using default persona.</p>
                </template>
                <form class="stack compact" @submit.prevent="setCampaignPersona()" style="margin-top:0.5rem;">
                  <textarea x-model="personaEditText" rows="3" placeholder="e.g. A wiry, fast-talking rogue with a crooked grin and ink-stained fingers" maxlength="140"></textarea>
                  <div style="display:flex; gap:0.5rem; align-items:center;">
                    <button type="submit" :disabled="!selectedCampaignId || !personaEditText.trim()">Save Persona</button>
                    <small x-text="(personaEditText || '').length + '/140'"></small>
                  </div>
                </form>
              </div>

              <template x-if="Object.keys(literaryStyles).length > 0">
                <div class="literary-styles-panel">
                  <h4>Literary Styles</h4>
                  <small class="flag-hint" style="margin-left:0;">Genre profiles extracted from source material during setup. These guide the narrator's prose style. Read-only.</small>
                  <div class="literary-styles-list">
                    <template x-for="[name, profile] in Object.entries(literaryStyles)" :key="name">
                      <details class="literary-style-item">
                        <summary x-text="name"></summary>
                        <p class="literary-style-profile" x-text="typeof profile === 'string' ? profile : JSON.stringify(profile, null, 2)"></p>
                      </details>
                    </template>
                  </div>
                </div>
              </template>

              <template x-if="Object.keys(sceneImages).length > 0">
                <div class="scene-images-panel">
                  <h4>Scene Images</h4>
                  <small class="flag-hint" style="margin-left:0;">Generated artwork cached per room. These are created when the narrator provides image prompts during play.</small>
                  <div class="scene-images-grid">
                    <template x-for="[room, url] in Object.entries(sceneImages)" :key="room">
                      <div class="scene-image-card">
                        <img :src="url" :alt="'Scene: ' + room" loading="lazy" />
                        <small x-text="room"></small>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <!-- Source Material sub-tab -->
            <div x-show="campaignConfigTab === 'source'" class="stack">
              <p class="tab-explainer">The narrator already has access to turn history and in-scope memories. Source material extends that with external lore &mdash; world-building docs, rulebooks, or backstory you paste in. The engine chunks and indexes the text so the narrator can retrieve relevant passages during play.</p>
              <div class="source-material">
                <h4>Source Material</h4>
                <button type="button" @click="loadSourceMaterials()" :disabled="!selectedCampaignId" style="margin-bottom:0.35rem;">Refresh</button>
                <template x-if="sourceMaterials.length > 0">
                  <ul class="source-docs-list">
                    <template x-for="doc in sourceMaterials" :key="doc.document_key">
                      <li>
                        <strong x-text="doc.document_label || doc.document_key"></strong>
                        <span x-text="'(' + (doc.format || 'generic') + ', ' + (doc.chunk_count || 0) + ' chunks)'"></span>
                      </li>
                    </template>
                  </ul>
                </template>
                <template x-if="sourceMaterials.length === 0">
                  <p class="muted">No source materials uploaded.</p>
                </template>

                <details class="source-upload-details">
                  <summary>Upload Source Material</summary>
                  <small class="flag-hint" style="margin-left:0;">Stores text verbatim as indexed chunks. Best for factual references, stat blocks, and short lore entries. Format matters: <em>Rulebook</em> stores as retrievable key-value facts, <em>Story</em> preserves narrative flow, <em>Generic</em> is a catch-all.</small>
                  <form class="stack compact" @submit.prevent="ingestSourceMaterial()">
                    <label>Label (optional)<input x-model="sourceUpload.label" placeholder="My Rulebook" /></label>
                    <label>
                      Format
                      <select x-model="sourceUpload.format">
                        <option value="">Auto-detect</option>
                        <option value="story">Story / Prose</option>
                        <option value="rulebook">Rulebook</option>
                        <option value="generic">Generic / Notes</option>
                      </select>
                    </label>
                    <label>Text Content<textarea x-model="sourceUpload.text" rows="6" placeholder="Paste source material here..."></textarea></label>
                    <label class="checkbox-label"><input type="checkbox" x-model="sourceUpload.replace" /> Replace existing document</label>
                    <button type="submit" :disabled="!selectedCampaignId || !sourceUpload.text.trim()">Upload</button>
                    <p x-show="sourceUploadStatus" x-text="sourceUploadStatus" class="muted"></p>
                  </form>
                </details>

                <details class="source-upload-details">
                  <summary>Search Source Material</summary>
                  <small class="flag-hint" style="margin-left:0;">Test what the narrator will actually retrieve for a given query. Useful for checking that your uploaded material is indexed and reachable.</small>
                  <form class="stack compact" @submit.prevent="searchSourceMaterial()">
                    <div class="source-search-row">
                      <input x-model="sourceSearchQuery" placeholder="Search query..." class="source-search-input" />
                      <input x-model="sourceSearchDocKey" placeholder="Doc key (optional)" class="source-search-dockey" />
                      <button type="submit" :disabled="!selectedCampaignId || !sourceSearchQuery.trim() || sourceSearching">Search</button>
                    </div>
                  </form>
                  <template x-if="sourceSearchResults.length > 0">
                    <div class="source-search-results">
                      <template x-for="(hit, idx) in sourceSearchResults" :key="idx">
                        <div class="source-search-hit">
                          <div class="source-hit-header">
                            <small x-text="hit.document_label || hit.document_key"></small>
                            <small class="source-hit-score" x-text="'score: ' + hit.score"></small>
                          </div>
                          <p class="source-hit-text" x-text="hit.text"></p>
                        </div>
                      </template>
                    </div>
                  </template>
                </details>

                <details class="source-upload-details">
                  <summary>Upload with Digest</summary>
                  <small class="flag-hint" style="margin-left:0;">Runs the text through the LLM to produce a condensed narrative summary before indexing. Better recall for long-form prose, but costs an extra generation pass. For story-format docs, also extracts literary style profiles. Rulebook-format docs skip the digest and store chunks directly.</small>
                  <form class="stack compact" @submit.prevent="ingestWithDigest()">
                    <label>Label<input x-model="digestUpload.label" placeholder="Story of the Northern Realms" required /></label>
                    <label>
                      Format
                      <select x-model="digestUpload.format">
                        <option value="">Auto-detect</option>
                        <option value="story">Story / Prose</option>
                        <option value="rulebook">Rulebook</option>
                        <option value="generic">Generic / Notes</option>
                      </select>
                    </label>
                    <label class="flag-toggle"><input type="checkbox" x-model="digestUpload.replace" /><span>Replace existing document</span></label>
                    <label>Text Content<textarea x-model="digestUpload.text" rows="6" placeholder="Paste source material here..."></textarea></label>
                    <button type="submit" :disabled="!selectedCampaignId || !digestUpload.text.trim() || !digestUpload.label.trim() || digestUploading">
                      <span x-show="!digestUploading">Upload with Digest</span>
                      <span x-show="digestUploading">Processing...</span>
                    </button>
                    <p x-show="digestUploadStatus" x-text="digestUploadStatus" class="muted"></p>
                  </form>
                </details>

                <details class="source-upload-details">
                  <summary>Browse Source Keys</summary>
                  <div class="stack compact">
                    <button type="button" @click="browseSourceKeys()" :disabled="!selectedCampaignId">Load Keys</button>
                    <template x-if="sourceBrowseKeys.length > 0">
                      <ul class="source-docs-list">
                        <template x-for="key in sourceBrowseKeys" :key="key"><li x-text="key"></li></template>
                      </ul>
                    </template>
                    <template x-if="sourceBrowseKeys.length === 0">
                      <p class="muted">No source keys found.</p>
                    </template>
                  </div>
                </details>
              </div>
            </div>

            <!-- Rules sub-tab -->
            <div x-show="campaignConfigTab === 'rules'" class="stack">
              <p class="tab-explainer">Rule <em>keys</em> are always listed to the narrator, but the full rule text is only loaded when the narrator explicitly requests it by key. This keeps the context window lean while still letting you define hard constraints. Use uppercase keys with hyphens. <strong>Add</strong> fails if the key already exists; <strong>Upsert</strong> overwrites it. Good keys are self-descriptive so the narrator knows when to request them (e.g. MAGIC-SYSTEM, COMBAT-RULES, FACTION-POLITICS).</p>
              <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                <button type="button" @click="loadCampaignRules()" :disabled="!selectedCampaignId">Refresh</button>
                <input x-model="campaignRuleLookupKey" placeholder="Rule key" />
                <button type="button" @click="loadCampaignRules(campaignRuleLookupKey.trim())" :disabled="!selectedCampaignId || !campaignRuleLookupKey.trim()">Load Rule</button>
              </div>
              <template x-if="campaignRules.length > 0">
                <ul class="source-docs-list">
                  <template x-for="rule in campaignRules" :key="rule.key">
                    <li><button type="button" @click="loadCampaignRules(rule.key)" x-text="rule.key"></button></li>
                  </template>
                </ul>
              </template>
              <template x-if="campaignRules.length === 0">
                <p class="muted">No campaign rules stored.</p>
              </template>
              <template x-if="selectedCampaignRule">
                <pre x-text="selectedCampaignRule.key + ': ' + selectedCampaignRule.value"></pre>
              </template>
              <form class="stack compact" @submit.prevent="saveCampaignRule()">
                <label>Key<input x-model="campaignRuleForm.key" placeholder="CAMPAIGN-RULE" /></label>
                <label>Rule<textarea x-model="campaignRuleForm.value" rows="4" placeholder="Rule text..."></textarea></label>
                <label>
                  Mode
                  <select x-model="campaignRuleForm.mode">
                    <option value="add">Add Only</option>
                    <option value="upsert">Upsert</option>
                  </select>
                </label>
                <button type="submit" :disabled="!selectedCampaignId || !campaignRuleForm.key.trim() || !campaignRuleForm.value.trim()">Save Rule</button>
                <p x-show="campaignRuleStatus" x-text="campaignRuleStatus" class="muted"></p>
              </form>
            </div>
          </div>
        </div>
      </template>

      <!-- ---- New Campaign Wizard Modal ---- -->
      <template x-if="$store.app.modal === 'newCampaign'">
        <div class="modal-panel modal-panel--lg">
          <div class="modal-header">
            <h3>New Campaign</h3>
            <button type="button" class="modal-close" @click="$store.app.closeModal()">&times;</button>
          </div>
          <div class="modal-body">

            <!-- Step indicator -->
            <div class="wizard-step-indicator">
              <span class="wizard-step-dot" :class="{ active: newCampaignWizard.step === 'info', done: ['creating','setup','finalizing','complete'].includes(newCampaignWizard.step) }">1</span>
              <span class="wizard-step-line" :class="{ done: ['creating','setup','finalizing','complete'].includes(newCampaignWizard.step) }"></span>
              <span class="wizard-step-dot" :class="{ active: newCampaignWizard.step === 'creating', done: ['setup','finalizing','complete'].includes(newCampaignWizard.step) }">2</span>
              <span class="wizard-step-line" :class="{ done: ['setup','finalizing','complete'].includes(newCampaignWizard.step) }"></span>
              <span class="wizard-step-dot" :class="{ active: ['setup','finalizing'].includes(newCampaignWizard.step), done: newCampaignWizard.step === 'complete' }">3</span>
              <span class="wizard-step-line" :class="{ done: newCampaignWizard.step === 'complete' }"></span>
              <span class="wizard-step-dot" :class="{ active: newCampaignWizard.step === 'complete' }">4</span>
            </div>

            <!-- Step 1: Info -->
            <template x-if="newCampaignWizard.step === 'info'">
              <form class="stack compact" @submit.prevent="wizardCreateCampaign()">
                <label>Campaign Name<input x-model="newCampaignWizard.name" placeholder="New Campaign" required /></label>
                <label>Your Character<input x-model="newCampaignWizard.actor_id" placeholder="your-character-name" required /></label>
                <div class="file-drop-zone"
                     @dragover.prevent
                     @dragenter.prevent="$el._dragCount = ($el._dragCount || 0) + 1; $el.classList.add('drag-over')"
                     @dragleave="$el._dragCount = ($el._dragCount || 1) - 1; if (!$el._dragCount) $el.classList.remove('drag-over')"
                     @drop.prevent="$el._dragCount = 0; $el.classList.remove('drag-over'); handleWizardFileDrop($event)">
                  <p class="drop-zone-text">Drop .txt / .md files here or <label class="file-pick-label">browse<input type="file" multiple accept=".txt,.md" @change="handleWizardFileSelect($event)" class="sr-only" /></label></p>
                  <template x-if="newCampaignWizard.files.length > 0">
                    <ul class="file-list">
                      <template x-for="(f, idx) in newCampaignWizard.files" :key="f.file.name">
                        <li class="file-item" :class="'file-' + f.status">
                          <span class="file-name" x-text="f.file.name"></span>
                          <small x-text="(f.file.size / 1024).toFixed(1) + ' KB'"></small>
                          <span class="file-status-dot" :class="'dot-' + f.status"></span>
                          <button type="button" @click="removeWizardFile(idx)" class="file-remove" :aria-label="'Remove ' + f.file.name">&times;</button>
                        </li>
                      </template>
                    </ul>
                  </template>
                </div>
                <template x-if="newCampaignWizard.files.length > 0">
                  <label class="flag-toggle">
                    <input type="checkbox" x-model="newCampaignWizard.on_rails" />
                    <span>On Rails <small>(follow a structured storyline)</small></span>
                  </label>
                </template>
                <button type="submit" class="btn-primary" style="text-align:center;">Create Campaign</button>
              </form>
            </template>

            <!-- Step 2: Creating -->
            <template x-if="newCampaignWizard.step === 'creating'">
              <div class="wizard-creating">
                <div class="spinner"></div>
                <p x-text="newCampaignWizard.createStatus || 'Creating...'"></p>
              </div>
            </template>

            <!-- Step 3: Setup -->
            <template x-if="newCampaignWizard.step === 'setup'">
              <div>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.5rem;">
                  <h4 style="margin:0; font-size:0.84rem; color:var(--accent);">Setup Wizard</h4>
                  <span class="setup-phase-badge" x-text="newCampaignWizard.setupPhase || 'starting'"></span>
                </div>
                <div class="wizard-setup-conversation" id="wizard-conversation">
                  <template x-for="(msg, idx) in newCampaignWizard.setupMessages" :key="idx">
                    <div class="wizard-msg" :class="msg.role === 'narrator' ? 'wizard-msg-narrator' : 'wizard-msg-player'" x-html="renderSimpleMarkdown(msg.text)"></div>
                  </template>
                </div>
                <form class="setup-message-form" @submit.prevent="wizardSendSetupMessage()">
                  <input x-model="newCampaignWizard.setupMessage" placeholder="Your response..." :disabled="newCampaignWizard.setupSending" class="setup-message-input" />
                  <button type="submit" :disabled="!newCampaignWizard.setupMessage.trim() || newCampaignWizard.setupSending">
                    <span x-show="!newCampaignWizard.setupSending">Send</span>
                    <span x-show="newCampaignWizard.setupSending">...</span>
                  </button>
                </form>
              </div>
            </template>

            <!-- Step 3b: Finalizing -->
            <template x-if="newCampaignWizard.step === 'finalizing'">
              <div class="wizard-creating">
                <div class="spinner"></div>
                <p>Building your world...</p>
              </div>
            </template>

            <!-- Step 4: Complete -->
            <template x-if="newCampaignWizard.step === 'complete'">
              <div class="wizard-complete">
                <h3>Your world has been created!</h3>
                <p>The campaign setup is complete. Start playing by submitting your first action.</p>
                <button type="button" class="btn-primary" @click="wizardFinish()" style="text-align:center;">Start Playing</button>
              </div>
            </template>

          </div>
        </div>
      </template>

    </div>
  </template>

  <!-- ====== SETTINGS DRAWER ====== -->
  <div class="settings-overlay" x-show="$store.app.settingsOpen" @click.self="$store.app.settingsOpen = false" @keydown.escape.window="$store.app.settingsOpen = false" x-cloak x-transition.opacity>
    <aside class="settings-drawer" role="dialog" aria-label="Settings">
      <div class="drawer-header">
        <h2 class="sr-only">Settings</h2>
        <div class="settings-tabs" role="tablist" aria-label="Settings sections"
             @keydown.left.prevent="(function(s){ var tabs=['llm','image','appearance']; var i=tabs.indexOf(s.settingsTab); s.settingsTab=tabs[(i-1+tabs.length)%tabs.length]; })($store.app); $nextTick(() => $el.querySelector('[aria-selected=true]')?.focus())"
             @keydown.right.prevent="(function(s){ var tabs=['llm','image','appearance']; var i=tabs.indexOf(s.settingsTab); s.settingsTab=tabs[(i+1)%tabs.length]; })($store.app); $nextTick(() => $el.querySelector('[aria-selected=true]')?.focus())">
          <button type="button" role="tab" id="settings-tab-llm" class="settings-tab"
            :class="{ active: $store.app.settingsTab === 'llm' }"
            :aria-selected="$store.app.settingsTab === 'llm'"
            :tabindex="$store.app.settingsTab === 'llm' ? 0 : -1"
            aria-controls="settings-panel-llm"
            @click="$store.app.settingsTab = 'llm'">LLM</button>
          <button type="button" role="tab" id="settings-tab-image" class="settings-tab"
            :class="{ active: $store.app.settingsTab === 'image' }"
            :aria-selected="$store.app.settingsTab === 'image'"
            :tabindex="$store.app.settingsTab === 'image' ? 0 : -1"
            aria-controls="settings-panel-image"
            @click="$store.app.settingsTab = 'image'">Image</button>
          <button type="button" role="tab" id="settings-tab-appearance" class="settings-tab"
            :class="{ active: $store.app.settingsTab === 'appearance' }"
            :aria-selected="$store.app.settingsTab === 'appearance'"
            :tabindex="$store.app.settingsTab === 'appearance' ? 0 : -1"
            aria-controls="settings-panel-appearance"
            @click="$store.app.settingsTab = 'appearance'">Appearance</button>
        </div>
        <button type="button" class="drawer-close" @click="$store.app.settingsOpen = false" aria-label="Close settings">&times;</button>
      </div>

      <!-- LLM Settings Panel -->
      <div id="settings-panel-llm" role="tabpanel" aria-labelledby="settings-tab-llm" class="stack" x-show="$store.app.settingsTab === 'llm'">
        <template x-if="runtimeInfo.gateway_backend && runtimeInfo.gateway_backend !== 'tge'">
          <p class="settings-note" style="margin-top:0">Backend is <strong x-text="runtimeInfo.gateway_backend"></strong>. LLM settings only apply to the tge backend.</p>
        </template>
        <template x-if="settingsLocked">
          <p class="settings-note" style="margin-top:0">
            Managed by DTM sync.
            <span x-text="settingsLockMessage || 'Use Discord-side backend controls instead.'"></span>
          </p>
        </template>

        <div class="settings-group">
          <p class="settings-group-title">Browser-Local Ollama</p>
          <p class="settings-note" style="margin-top:0">
            Uses this browser tab to call your own local Ollama for your turns only. This does not change the campaign backend for other players.
          </p>
          <p class="settings-note" style="margin-top:0">
            Your local Ollama must allow this web UI's browser origin via <code>OLLAMA_ORIGINS</code>, or browser requests to <code>/api/chat</code> will be blocked.
          </p>
          <div class="stack compact">
            <label class="checkbox-inline">
              <input type="checkbox" x-model="browserLocalOllama.enabled" />
              <span>Use my local Ollama for my turns</span>
            </label>

            <label>
              Local Base URL
              <input x-model="browserLocalOllama.base_url" placeholder="http://127.0.0.1:11434" />
            </label>

            <label>
              Local Model
              <input x-model="browserLocalOllama.model" placeholder="llama3.1:8b" />
            </label>

            <label>
              Keep-Alive
              <input x-model="browserLocalOllama.keep_alive" placeholder="30m" />
            </label>

            <label>
              Timeout (seconds)
              <input type="number" x-model.number="browserLocalOllama.timeout_seconds" min="1" max="3600" />
            </label>

            <details>
              <summary>Advanced Options</summary>
              <label>
                Options JSON
                <textarea x-model="browserLocalOllama.ollama_options_json" rows="3" placeholder="{}"></textarea>
              </label>
            </details>
          </div>
          <div class="drawer-actions">
            <button type="button" @click="testBrowserLocalOllama()">Test Local Ollama</button>
            <button type="button" @click="saveBrowserLocalOllamaSettings()" class="btn-primary">Save Browser Settings</button>
          </div>
          <p class="settings-status" :class="browserLocalOllamaStatus.ok === false ? 'error' : 'status'" x-show="browserLocalOllamaStatus.message" x-text="browserLocalOllamaStatus.message"></p>
        </div>

        <div class="settings-group">
          <p class="settings-group-title">Connection</p>
          <div class="stack compact">
            <label>
              Model
              <select x-model="settingsForm.model" x-show="ollamaModels.length > 0 && settingsForm.completion_mode === 'ollama'" :disabled="settingsSaving || settingsLocked">
                <template x-for="m in ollamaModels" :key="m.name">
                  <option :value="m.name" x-text="m.name"></option>
                </template>
              </select>
              <input x-model="settingsForm.model" placeholder="model name" x-show="ollamaModels.length === 0 || settingsForm.completion_mode !== 'ollama'" :disabled="settingsSaving || settingsLocked" />
            </label>

            <label>
              Base URL
              <input x-model="settingsForm.base_url" placeholder="http://127.0.0.1:11434" @change="loadOllamaModels()" :disabled="settingsSaving || settingsLocked" />
            </label>

            <label>
              Completion Mode
              <select x-model="settingsForm.completion_mode" @change="loadOllamaModels()" :disabled="settingsSaving || settingsLocked">
                <option value="zai">Z.ai</option>
                <option value="ollama">Ollama</option>
                <option value="openai">OpenAI Compatible</option>
                <option value="codex">Codex</option>
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
                <option value="opencode">Opencode</option>
                <option value="deterministic">Deterministic (no LLM)</option>
              </select>
            </label>
          </div>
        </div>

        <div class="settings-group">
          <p class="settings-group-title">Generation</p>
          <div class="stack compact">
            <label>
              Temperature: <strong x-text="Number(settingsForm.temperature).toFixed(2)"></strong>
              <input type="range" min="0" max="2" step="0.05" x-model.number="settingsForm.temperature" :disabled="settingsSaving || settingsLocked" />
            </label>

            <label>
              Max Tokens
              <input type="number" x-model.number="settingsForm.max_tokens" min="64" max="65536" :disabled="settingsSaving || settingsLocked" />
            </label>

            <label>
              Timeout (seconds)
              <input type="number" x-model.number="settingsForm.timeout_seconds" min="1" max="600" :disabled="settingsSaving || settingsLocked" />
            </label>
          </div>
        </div>

        <div class="settings-group">
          <p class="settings-group-title">Ollama</p>
          <div class="stack compact">
            <label>
              Keep-Alive
              <input x-model="settingsForm.keep_alive" placeholder="30m" :disabled="settingsSaving || settingsLocked" />
            </label>

            <details>
              <summary>Advanced Options</summary>
              <label>
                Options JSON
                <textarea x-model="settingsForm.ollama_options_json" rows="3" placeholder="{}" :disabled="settingsSaving || settingsLocked"></textarea>
              </label>
            </details>
          </div>
        </div>

        <div class="drawer-actions">
          <button type="button" @click="testConnection()" :disabled="settingsSaving || settingsLocked">Test Connection</button>
          <button type="button" @click="applySettings()" :disabled="settingsSaving || settingsLocked" class="btn-primary">Apply Changes</button>
        </div>

        <p class="settings-note" x-show="!settingsLocked">Settings persist across restarts after clicking Apply.</p>
        <p class="settings-status" :class="settingsStatus.ok === false ? 'error' : 'status'" x-show="settingsStatus.message" x-text="settingsStatus.message"></p>
      </div>

      <!-- Image Settings Panel -->
      <div id="settings-panel-image" role="tabpanel" aria-labelledby="settings-tab-image" class="stack" x-show="$store.app.settingsTab === 'image'">

        <div class="settings-group">
          <p class="settings-group-title">Backend</p>
          <div class="stack compact">
            <label>
              Image Backend
              <select x-model="imageSettingsForm.image_backend">
                <option value="none">None (disabled)</option>
                <option value="diffusers">Diffusers</option>
                <option value="comfyui">ComfyUI</option>
              </select>
            </label>
          </div>
        </div>

        <!-- Diffusers group -->
        <div class="settings-group" x-show="imageSettingsForm.image_backend === 'diffusers'">
          <p class="settings-group-title">Diffusers</p>
          <div class="stack compact">
            <label>
              Host
              <input x-model="imageSettingsForm.diffusers_host" placeholder="127.0.0.1" />
            </label>
            <label>
              Port
              <input type="number" x-model.number="imageSettingsForm.diffusers_port" min="1" max="65535" />
            </label>
            <label>
              Model
              <input x-model="imageSettingsForm.diffusers_model" placeholder="e.g. black-forest-labs/FLUX.1-dev" />
            </label>
            <label>
              Device
              <select x-model="imageSettingsForm.diffusers_device">
                <option value="cpu">CPU</option>
                <option value="cuda">CUDA</option>
                <option value="rocm">ROCm</option>
                <option value="mps">MPS</option>
              </select>
            </label>
            <label>
              Dtype
              <select x-model="imageSettingsForm.diffusers_dtype">
                <option value="f16">float16</option>
                <option value="bf16">bfloat16</option>
                <option value="f32">float32</option>
              </select>
            </label>
            <label>
              Offload
              <select x-model="imageSettingsForm.diffusers_offload">
                <option value="none">None</option>
                <option value="model">Model offload</option>
                <option value="sequential">Sequential offload</option>
              </select>
            </label>
            <label>
              Quantization
              <select x-model="imageSettingsForm.diffusers_quantization">
                <option value="none">None</option>
                <option value="int8">INT8</option>
                <option value="int4">INT4</option>
              </select>
            </label>
            <label class="flag-toggle">
              <input type="checkbox" x-model="imageSettingsForm.diffusers_vae_tiling" />
              <span>VAE Tiling</span>
            </label>
            <label class="flag-toggle">
              <input type="checkbox" x-model="imageSettingsForm.diffusers_autostart" />
              <span>Autostart Daemon</span>
            </label>

            <div style="display:flex; align-items:center; gap:0.5rem; margin-top:0.25rem;">
              <span style="font-size:0.82rem; font-weight:500; color:#3a4e46;">Daemon:</span>
              <span style="font-size:0.82rem;" :style="imageDaemonState === 'error' ? 'color:var(--error);font-weight:500' : ''" x-text="imageDaemonState || 'not running'"></span>
              <button type="button" @click="startImageDaemon()" :disabled="imageDaemonBusy" style="font-size:0.78rem; padding:0.25rem 0.55rem;">Start</button>
              <button type="button" @click="stopImageDaemon()" :disabled="imageDaemonBusy" style="font-size:0.78rem; padding:0.25rem 0.55rem;">Stop</button>
            </div>
            <template x-if="imageDaemonState === 'error' && imageDaemonLogs">
              <details>
                <summary style="font-size:0.78rem; color:var(--error);">Daemon error logs</summary>
                <pre style="font-size:0.72rem; max-height:160px; overflow:auto; margin-top:0.3rem; background:#fff8f8; border:1px solid #f0d0d0; border-radius:6px; padding:0.5rem;" x-text="imageDaemonLogs"></pre>
              </details>
            </template>
          </div>
        </div>

        <!-- ComfyUI group -->
        <div class="settings-group" x-show="imageSettingsForm.image_backend === 'comfyui'">
          <p class="settings-group-title">ComfyUI</p>
          <div class="stack compact">
            <label>
              URL
              <input x-model="imageSettingsForm.comfyui_url" placeholder="http://127.0.0.1:8188" />
            </label>
            <label>
              Workflow JSON
              <textarea x-model="imageSettingsForm.comfyui_workflow_json" rows="4" placeholder="Paste ComfyUI workflow JSON here"></textarea>
            </label>
          </div>
        </div>

        <!-- Generation group -->
        <div class="settings-group" x-show="imageSettingsForm.image_backend !== 'none'">
          <p class="settings-group-title">Generation</p>
          <div class="stack compact">
            <label>
              Width
              <input type="number" x-model.number="imageSettingsForm.image_width" min="64" max="4096" step="64" />
            </label>
            <label>
              Height
              <input type="number" x-model.number="imageSettingsForm.image_height" min="64" max="4096" step="64" />
            </label>
            <label>
              Steps
              <input type="number" x-model.number="imageSettingsForm.image_steps" min="1" max="200" />
            </label>
            <label>
              Guidance Scale: <strong x-text="Number(imageSettingsForm.image_guidance_scale).toFixed(1)"></strong>
              <input type="range" min="0" max="20" step="0.5" x-model.number="imageSettingsForm.image_guidance_scale" />
            </label>
            <label>
              Cache Max Entries
              <input type="number" x-model.number="imageSettingsForm.image_cache_max_entries" min="0" max="10000" />
            </label>
          </div>
        </div>

        <div class="drawer-actions" style="grid-template-columns:1fr;">
          <button type="button" @click="applyImageSettings()" :disabled="imageSettingsSaving" class="btn-primary">Apply Changes</button>
        </div>

        <p class="settings-note">Some changes require a server restart.</p>
        <p class="settings-status" :class="imageSettingsStatus.ok === false ? 'error' : 'status'" x-show="imageSettingsStatus.message" x-text="imageSettingsStatus.message"></p>
      </div>

      <!-- Appearance Settings Panel -->
      <div id="settings-panel-appearance" role="tabpanel" aria-labelledby="settings-tab-appearance" class="stack" x-show="$store.app.settingsTab === 'appearance'">
        <div class="settings-group">
          <p class="settings-group-title">Theme</p>
          <div class="stack compact">
            <label>
              Color Theme
              <select x-model="$store.app.theme" @change="$store.app.applyTheme($event.target.value)">
                <template x-for="t in $store.app.themes" :key="t.value">
                  <option :value="t.value" x-text="t.label"></option>
                </template>
              </select>
            </label>
            <p class="settings-note" style="margin-top:0">Choose a color theme for the interface. Custom themes can be installed via pip or placed in <code style="font-size:0.76rem;">~/.text-game-webui/themes/</code>.</p>
          </div>
        </div>
      </div>
    </aside>
  </div>
  </template>

</section>
{% endblock %}
