<!doctype html>
<html lang="en" data-theme="{{ theme or 'light' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name or "text-game-webui" }}</title>
    <link rel="icon" href="/media/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply theme immediately to prevent flash. Reconcile localStorage
      // with the server-rendered data-theme and enable custom CSS if needed.
      (function() {
        var serverTheme = document.documentElement.getAttribute('data-theme') || 'light';
        var stored = localStorage.getItem('theme');
        // Prefer localStorage (client chose this), fall back to server value
        var theme = stored || serverTheme;
        // Sync both sides so they agree
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        // Enable custom CSS link for non-builtin themes
        var builtins = ['light', 'dark'];
        if (builtins.indexOf(theme) === -1) {
          var link = document.getElementById('custom-theme-css');
          if (link) {
            link.href = '/api/themes/' + encodeURIComponent(theme) + '/theme.css';
            link.disabled = false;
          }
        }
      })();
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/tokens.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="/static/css/themes/dark.css" />
    <link id="custom-theme-css" rel="stylesheet" href="" disabled />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left" x-data>
        <button type="button" class="sidebar-toggle" title="Toggle sidebar" @click="$store.app.sidebarOpen = !$store.app.sidebarOpen" aria-label="Toggle sidebar">&#x2630;</button>
        <h1>{{ app_name or "text-game-webui" }}</h1>
      </div>
      <div class="topbar-controls" x-data>
        <label class="debug-toggle">
          <input type="checkbox" :checked="$store.app.debugMode" @change="$store.app.toggleDebugMode()" />
          <span>Debug</span>
        </label>
        <button type="button" class="gear-btn" title="Settings" @click="$store.app.settingsOpen = !$store.app.settingsOpen">&#9881;</button>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
  </body>
</html>
