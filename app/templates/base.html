<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name or "text-game-webui" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>{{ app_name or "text-game-webui" }}</h1>
      <p>FastAPI + HTMX shell for text-game-engine</p>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
  </body>
</html>
